name: Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Pin npm version
        run: |
          npm install -g npm@10.8.2
          npm --version

      - name: Install dependencies
        run: |
          if ! npm ci; then
            echo "WARN: npm ci failed on runner, fallback to npm install"
            npm install --no-audit --no-fund
          fi

      - name: Build frontend
        run: npm run build

      - name: Upload build artifact to server (attempt 1)
        id: upload_build_1
        continue-on-error: true
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          timeout: 180s
          command_timeout: 20m
          source: build
          target: /home/ubuntu/conginstrument-web/
          overwrite: true

      - name: Upload build artifact to server (attempt 2)
        id: upload_build_2
        if: steps.upload_build_1.outcome == 'failure'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          timeout: 180s
          command_timeout: 20m
          source: build
          target: /home/ubuntu/conginstrument-web/
          overwrite: true

      - name: Fail if upload failed twice
        if: steps.upload_build_1.outcome == 'failure' && steps.upload_build_2.outcome == 'failure'
        run: |
          echo "ERROR: front-end artifact upload failed twice"
          exit 1
