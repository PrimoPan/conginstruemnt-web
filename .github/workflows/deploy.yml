name: Deploy Frontend

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          if ! npm ci; then
            echo "WARN: npm ci failed on runner, fallback to npm install"
            npm install --no-audit --no-fund
          fi

      - name: Build frontend
        run: npm run build

      - name: Prepare remote build dir
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            mkdir -p /home/ubuntu/conginstrument-web
            rm -rf /home/ubuntu/conginstrument-web/build

      - name: Upload build artifact to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: build
          target: /home/ubuntu/conginstrument-web/

      - name: Verify deployed build
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            test -f /home/ubuntu/conginstrument-web/build/index.html
            echo "${{ github.sha }}" > /home/ubuntu/conginstrument-web/build/.deployed_sha
            ls -lah /home/ubuntu/conginstrument-web/build | head -n 20
